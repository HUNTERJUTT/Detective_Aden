<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Detective Aden</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="clouds"></div>
<div class="particles"></div>

<header>
<h1>🕵️ Detective Aden</h1>

<div class="stats">
<div class="box" id="box1">Case 1</div>
<div class="box" id="box2">Accuracy 100%</div>
<div class="box" id="box3">Time 0s</div>
</div>
</header>

<div id="caseTitle"></div>
<div id="caseInfo"></div>

<h2 style="text-align:center">Suspects</h2>
<div id="board"></div>

<div id="popup" class="popup hidden">
<div class="popupBox">
<h2>Suspect Profile</h2>
<div id="popupData"></div>
<button onclick="closePopup()">Close</button>
</div>
</div>

<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
